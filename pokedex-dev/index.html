<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pokedex</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>pokedex</h1>
        <img src="imagepokemon" alt="https://via.placeholder.com/150" class="imagem">
    </div>
    <div class="info">
        <p><strong>nome:</strong><span class="nome">---</span></p>
        <p><strong>numero:</strong><span class="numero">---</span></p>
        <p><strong>tipo:</strong><span class="tipo">---</span></p>

    </div>
    <div class="busca">
        <input type="text" id="entrada" placeholder="informe o nome ou numero">
    </div>
</body>
</html>
