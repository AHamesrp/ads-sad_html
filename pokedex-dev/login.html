<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
body{
    height: 100vh;
    background: linear-gradient(135deg,#000000 );
    display: flex;
    align-items:center;
    justify-content: center;
}
.login-container{
    background:white;
    padding: 40px 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0px 10px 20px rgba(0,0,0,0,);
}
.login-container h2{
    margin-bottom: 20px;
    color: #333;
}
.login-container input{
    width: 100%;
    padding: 10px 15px;
    margin: 10px 0;
    border: 1px;
    border-radius: 8px;
    font-size: 14px;
}
.login-container button{
    width: 100px;
    padding: 12px;
    margin-top:  15px;
    border-radius: 8px;
    border: none;
    background: cadetblue;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
}

.login-container button:hover{
    background: green;
}

.login-container p{
    margin-top: 15px;
    font-size: 12px;
    color: #666;
}
    </style>
</head>
<body>
    <div class="login-container">
<h2> login</h2>
<form >
    <input type="text" placeholder="Usuario" required>
    <input type="password" placeholder="senha" required>
    <button type="submit"> entre</button>
</form>
<p>esqueceu a senha</p>
    </div>
    
</body>
</html>
