<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabunn2</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ff9249;
            color: #333;
        }
        header {
            background-color: #0d3c94; 
            color: #fff; 
            padding: 1rem 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .logo {
            display: flex;
            align-items: center;
            margin-left: 20px; 
        }
        .logo img {
            height: 50px; 
            margin-right: 10px; 
        }
        .logo h1 {
            margin: 0; 
            font-size: 1.8rem;
        }
        .menu-principal ul {
            list-style: none; 
            margin: 0;
            padding: 0;
            display: flex; 
            margin-right: 20px; 
        }
        .menu-principal ul li {
            margin-left: 20px; 
        }
        .menu-principal ul li a {
            color: #fff; 
            text-decoration: none; 
            padding: 0.5rem 1rem;
            transition: background-color 0.3s ease; 
        }
        .menu-principal ul li a:hover {
            background-color: #555; 
            border-radius: 5px; 
        }
    </style>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="">
            <h1>Kabunn2</h1>
        </div>
        <nav class="menu-principal">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Seja bem-vindo !</h2>
            <p>Navegue pelo site e se divirta.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Kabunn2. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
